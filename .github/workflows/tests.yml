name: CI - Testes

on:
  pull_request:
    branches: [ master, develop ]
  push:
    branches: [ develop ]

jobs:
  unit-tests:
    name: Testes Unitários
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Favly.slnx

      - name: Build
        run: dotnet build Favly.slnx --no-restore --configuration Release

      - name: Rodar testes unitários
        run: dotnet test Tests/Favly.Tests.Unit --no-build --configuration Release --verbosity normal

  integration-tests:
    name: Testes de Integração
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Favly.slnx

      - name: Build
        run: dotnet build Favly.slnx --no-restore --configuration Release

      - name: Rodar testes de integração
        run: dotnet test Tests/Favly.Tests.Integration --no-build --configuration Release --verbosity normal
